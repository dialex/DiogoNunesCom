# Build the Astro site and publish it to GitHub Pages.
#
# The site lives at the repo root; `astro build` emits static output to `dist/`
# (gitignored), which is uploaded as a Pages artifact and deployed — no branch
# push, no committed build output.
#
# Deploy target is `main` — the trunk. Every push to it publishes. Pages source
# is "GitHub Actions" (build_type: workflow), so this workflow is the only
# publish path. (The old `migration/gh-pages` PROD branch is now vestigial.)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: read the repo, write the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; don't cancel a publish mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build with Astro
        uses: withastro/action@v6
        with:
          node-version: 22
          package-manager: npm

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
